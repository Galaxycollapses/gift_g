<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mini App</title>

    <!-- Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<button id="mainBtn">Нажми меня</button>

<script>
    // Получаем Telegram объект
    const tg = window.Telegram.WebApp;

    // Инициализация (ОБЯЗАТЕЛЬНО)
    tg.ready();
    tg.expand();

    console.log("Platform:", tg.platform);
    console.log("InitData:", tg.initData);

    const button = document.getElementById("mainBtn");

    button.onclick = () => {

        console.log("Button clicked");

        // отправка данных боту
        tg.sendData(JSON.stringify({
            action: "second_button_clicked",
            time: Date.now()
        }));

        // визуальный фидбек
        button.innerText = "Отправлено ✅";
    };
</script>

</body>
</html>
