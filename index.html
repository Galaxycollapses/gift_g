<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: var(--tg-theme-bg-color, #ffffff);
        }
        #main-btn {
            padding: 15px 30px; font-size: 18px; border-radius: 12px; border: none;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="main-btn">Подтвердить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем окно

        const confirmBtn = document.getElementById('main-btn');

        confirmBtn.addEventListener('click', () => {
            // Читаем параметры из URL
            const urlParams = new URLSearchParams(window.location.search);
            let arg = urlParams.get('arg');

            // Если аргумента в ссылке нет или он пустой — шлем метку
            if (!arg || arg === 'None' || arg === '') {
                arg = "_NO_ARG_";
            }

            // Отправляем данные боту (это закроет Mini App)
            tg.sendData(arg);
        });
    </script>
</body>
</html>
