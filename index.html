<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>Регистрация</h2>

<button id="next">Далее</button>

<script>
const tg = window.Telegram.WebApp;

document.getElementById("next").onclick = () => {

    tg.sendData(JSON.stringify({
        action: "request_phone"
    }));

};
</script>

</body>
</html>
