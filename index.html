<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: var(--tg-theme-bg-color); }
        button { padding: 15px 30px; font-size: 18px; border-radius: 12px; border: none; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); cursor: pointer; }
    </style>
</head>
<body>
    <button id="main-btn">Подтвердить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('main-btn').addEventListener('click', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const arg = urlParams.get('arg') || "";
            const userId = tg.initDataUnsafe.user.id; // Получаем ID пользователя

            // Отправляем запрос на наш Python сервер
            // Мы используем относительный путь /confirm
            try {
                await fetch('/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        argument: arg
                    })
                });
                // Кнопка нажата, запрос ушел, приложение НЕ закрывается
                alert("Запрос отправлен!");
            } catch (e) {
                alert("Ошибка: " + e);
            }
        });
    </script>
</body>
</html>
