<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini App</title>
</head>
<body>
    <button id="btn"></button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;

        // текст кнопки (можно захардкодить или подтянуть с сервера)
        const buttonText = "Нажми меня"; // можно синхронизировать с config

        const btn = document.getElementById("btn");
        btn.innerText = buttonText;

        btn.onclick = () => {
            tg.sendData("button_clicked");
            tg.close();  // ← добавь это
        };
        tg.expand();
    </script>
</body>
</html>
