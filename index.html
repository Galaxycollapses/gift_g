<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #248bcf;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Здесь будет динамически установлен текст кнопки -->
    <button id="mainButton"></button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const btn = document.getElementById('mainButton');

        // Получаем текст кнопки из параметров URL
        const urlParams = new URLSearchParams(window.location.search);
        const buttonText = urlParams.get('buttonText') || "Нажми меня (дефолт)"; // Fallback на случай, если параметр не передан
        btn.innerText = buttonText;
    </script>
</body>
</html>
