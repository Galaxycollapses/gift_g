<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #248bcf;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Текст этой кнопки будет установлен JavaScript-ом -->
    <button id="mainButton"></button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        const btn = document.getElementById('mainButton');

        // Получаем текст кнопки из параметров URL, переданных ботом
        const urlParams = new URLSearchParams(window.location.search);
        const buttonText = urlParams.get('buttonText') || "Нажми меня (дефолт)"; // Если параметр не передан, используем дефолт
        btn.innerText = buttonText;

        btn.addEventListener('click', () => {
            // Отправляем данные боту и закрываем приложение
            tg.sendData("ref_clicked");
            // Если вы хотите закрывать WebApp после нажатия, раскомментируйте следующую строку:
            // tg.close();
        });
    </script>
</body>
</html>
