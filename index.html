<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тестовое мини-приложение</h1>
    <button onclick="sendTestMessage()">Отправить простой текст</button>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        console.log("WebApp Ready");

        function sendTestMessage() {
            try {
                const testData = "Hello from simple test app!";
                console.log("Sending data:", testData);
                WebApp.sendData(testData);
                console.log("Data sent. Closing WebApp.");
                WebApp.close();
            } catch (error) {
                console.error("Error sending data:", error);
            }
        }
    </script>
</body>
</html>
