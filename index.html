<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mini App</title>

    <!-- Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<button onclick="test()">TEST</button>

<script>
    const tg = window.Telegram.WebApp;

    tg.ready();

    function test() {
        alert("CLICK");
        tg.sendData("HELLO_FROM_WEBAPP");
    }
</script>

</body>
</html>
