<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h2>Mini App</h2>

<button onclick="sendData()" style="padding:15px;font-size:18px;">
    Нажми на меня
</button>

<script>
    const tg = window.Telegram.WebApp;

    tg.expand();

    function sendData() {
        tg.sendData("clicked"); // отправляем данные боту
    }
</script>

</body>
</html>
