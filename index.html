<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #248bcf;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <button id="mainButton">Нажми меня</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        const btn = document.getElementById('mainButton');

        // Текст кнопки внутри веб-приложения.
        // Если вы его передаете через URL, используйте:
        // const urlParams = new URLSearchParams(window.location.search);
        // const buttonText = urlParams.get('buttonText') || "Нажми меня";
        // btn.innerText = buttonText;

        // Если текст статичен (как в этом примере):
        btn.innerText = "Нажми меня";

        btn.addEventListener('click', () => {
            tg.sendData("ref_clicked");
            // tg.close(); // Можно добавить закрытие, если нужно
        });
    </script>
</body>
</html>
