<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini App</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Текст кнопки будет вставлен из конфига при деплое или через JS -->
    <button id="mainButton">Загрузка...</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        // Имитируем получение текста из "конфига" (в реальности можно передать параметром в URL)
        const buttonText = "Нажми меня";
        const btn = document.getElementById('mainButton');
        btn.innerText = buttonText;

        btn.addEventListener('click', () => {
            // Отправляем данные боту (работает только для KeyboardButton)
            tg.sendData("Кнопка нажата!");

            // Если вы хотите вывести в консоль БОТА при нажатии из Inline-кнопки,
            // здесь должен быть fetch запрос к вашему API.
            console.log("Кнопка нажата внутри Mini App");

            tg.close(); // Закрыть приложение
        });
    </script>
</body>
</html>
