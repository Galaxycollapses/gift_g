<!DOCTYPE html>
<html>
<head>
    <title>Мое Мини-Приложение</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #f0f2f5); /* Используем тему Telegram */
            color: var(--tg-theme-text-color, #000000); /* Цвет текста из темы */
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #007bff); /* Цвет кнопки из темы */
            color: var(--tg-theme-button-text-color, white); /* Цвет текста кнопки из темы */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: var(--tg-theme-button-color-hover, #0056b3); /* Цвет при наведении */
        }
    </style>
</head>
<body>
    <button id="mainButton"></button>

    <script>
        const button = document.getElementById('mainButton');

        // Функция для получения параметра из URL
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Получаем текст для кнопки из параметра URL, переданного ботом
        const miniAppButtonText = getQueryParam('button_text');
        if (miniAppButtonText) {
            button.textContent = miniAppButtonText;
        } else {
            button.textContent = "Нажми меня!"; // Текст по умолчанию
        }

        button.addEventListener('click', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                let dataToSend = 'standard_click'; // Данные по умолчанию

                // Проверяем, был ли бот запущен по диплинку
                if (initData && initData.start_param) {
                    dataToSend = 'deep_link_click';
                }

                // Отправляем данные боту и закрываем мини-приложение
                window.Telegram.WebApp.sendData(dataToSend);
                window.Telegram.WebApp.close();
            } else {
                alert('Telegram Web App script not loaded or not in Telegram environment.');
            }
        });

        // Инициализация Web App
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Расширяем мини-приложение на весь экран
            // Дополнительно можно настроить внешний вид WebApp, используя themeParams
            document.body.style.backgroundColor = window.Telegram.WebApp.themeParams.bg_color || '#f0f2f5';
        } else {
            console.error('Telegram Web App script not found.');
        }
    </script>
</body>
</html>
