<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
        }
        #main-btn {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="main-btn">Загрузка...</button>

    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('main-btn');

        // Сообщаем Telegram, что приложение готово
        tg.ready();
        tg.expand();

        // Получаем текст кнопки из параметров URL (передадим его через бота)
        const urlParams = new URLSearchParams(window.location.search);
        const btnText = urlParams.get('btn_text');
        if (btnText) {
            btn.innerText = btnText;
        }

        btn.addEventListener('click', () => {
            // Проверяем наличие параметра start_param (диплинк)
            // Он доступен в initDataUnsafe, если пользователь зашел по ссылке /start=...
            const startParam = tg.initDataUnsafe.start_param;

            if (startParam) {
                // Если зашли по ссылке
                tg.sendData("link_activated");
            } else {
                // Если просто нажали /start
                tg.sendData("just_hello");
            }

            // Закрываем приложение сразу после отправки данных
            tg.close();
        });
    </script>
</body>
</html>
