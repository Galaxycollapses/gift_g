<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-confirm {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ccc; /* Серый цвет */
            color: #666;
            border: none;
            border-radius: 10px;
            cursor: not-allowed; /* Курсор запрета */
            pointer-events: none; /* Делает кнопку некликабельной */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Текст кнопки подтянется из параметров или можно оставить статичным -->
        <button class="btn-confirm" id="main-btn">Подтвердить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на все окно

        // Можно динамически менять текст из URL параметров,
        // но для простоты оставим как в задании
    </script>
</body>
</html>
